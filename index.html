<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Project Engine</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!--Popmotion animation-->
  <script src="https://unpkg.com/popmotion/dist/popmotion.global.min.js"></script>
</head>

<body>
  <h1>Legacy Pokemon Search Engine</h1>
  <!-- search area -->
  <div class="search-area">
    <input type="text" id="pokemonName" placeholder="Enter pokemon name">
    <button onclick="getPokemon()">Search</button>
  </div>

  <!--main layout-->
  <div class="main-area">
    <div id="box">
      <h2 id="name">Name of pokemon</h2>
      <img id="image" src="" alt="Pokemon image">
      <p id="type">Type of pokemon</p>
    </div>
    <div id="circle"></div>
  </div>
  <!--Javascript-->
  <script src="script.js"></script>

</body>
</html>
